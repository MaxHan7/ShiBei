tyScore":5,"sourceOrder":1,"sourceStartOffset":524,"sourceEndOffset":607},{"id":"kp-2","title":"Hook与Prompt的关键区别：请求 vs 机制","knowledgeType":"comparison","summary":"Prompt是请求模型记住规则，靠模型自觉；Hook是系统强制执行的机制，每次必然发生。","keyClaim":"对于每次都必须发生的行为，不应只依赖prompt，应使用hook。","sourceQuote":"这和“把规则写进 prompt”最大的区别在于：prompt 是请求模型记住；hook 是让系统执行。你可以反复对 AI 说“改完代码记得格式化”，也可以在 PostToolUse 里规定，只要它编辑了文件，就自动跑 formatter。前者靠模型自觉，后者靠机制。","testabilityReason":"对比清晰，可设计判断场景题。","structureRole":"boundary","importanceScore":5,"coverageReason":"核心对比，帮助理解hook的必要性。","questionAngles":["为什么“每次都必须发生”的行为不应只写在prompt里？","请举例说明prompt无法保证而hook可以保证的重复性动作。"],"testabilityScore":5,"sourceOrder":2,"sourceStartOffset":782,"sourceEndOffset":915},{"id":"kp-6","title":"产品经理的常见认知误区：自然语言指挥=掌握工程流","knowledgeType":"counterexample","summary":"很多产品经理误认为能用自然语言指挥AI生成代码就等于掌握了AI工程流，忽略了可控性、自动化检查和边界约束。","keyClaim":"Vibe coding让demo变快，但工程需要行为可控，hook是弥补这一差距的关键。","sourceQuote":"但也正因为它太顺，很多人会误以为“会用自然语言指挥 Claude Code”就等于“掌握了 AI 工程流”。忽略了：你有没有把不可接受的行为拦住，有没有把重复动作自动化，有没有在 AI 结束前逼它完成最低限度的检查。","testabilityReason":"常见误区，可考查产品经理应当补充的工程直觉。","structureRole":"boundary","importanceScore":5,"coverageReason":"直击目标读者（产品经理）的认知盲区，是文章核心论点之一。","questionAngles":["产品经理在使用AI coding时容易忽略哪些工程层面的问题？","为什么说“自然语言驱动代码”不是终点？"],"testabilityScore":5,"sourceOrder":3,"sourceStartOffset":1295,"sourceEndOffset":1403},{"id":"kp-3","title":"使用Hook的四个信号","knowledgeType":"scenario","summary":"当遇到以下四种信号时，应考虑使用hook：AI开始碰危险动作、同样的提醒重复三遍、demo要交给别人继续改、AI session变长。","keyClaim":"Hook不是一开始就需要，而是在从“可运行”走向“可复用”时介入。","sourceQuote":"真正该上 hook 的时刻，通常有四个信号。第一个信号，是 AI 开始碰危险动作。第二个信号，是同样的提醒你已经说了三遍。第三个信号，是 demo 要交给别人继续改。第四个信号，是 AI session 变长了。","testabilityReason":"信号明确，可考查判断何时使用hook。","structureRole":"method_step","importanceScore":5,"coverageReason":"提供了使用hook的实战判断标准，实用性强。","questionAngles":["哪四种信号表明应该引入hook？","为什么短session不需要hook？"],"testabilityScore":5,"sourceOrder":4,"sourceStartOffset":1587,"sourceEndOffset":1623},{"id":"kp-4","title":"四类高频Hook场景","knowledgeType":"step","summary":"PostToolUse自动整理代码、PreToolUse拦截风险命令、SessionStart注入上下文、Stop验收完成度。","keyClaim":"初学者只需掌握四类高频场景即可有效使用hook。","sourceQuote":"如果你刚开始用 Claude Code，不需要把文档里所有事件都学完。先记住几个高频场景就够了。第一类，是改完之后自动整理。第二类，是执行前拦截风险。第三类，是会话开始时注入上下文。第四类，是结束前验收。","testabilityReason":"场景分类明确，可设计匹配题或案例题。","structureRole":"method_step","importanceScore":4,"coverageReason":"提供具体可操作的方法，是文章实用部分。","questionAngles":["请分别说明PostToolUse和PreToolUse的典型用途。","Stop hook主要用于解决什么问题？"],"testabilityScore":4,"sourceOrder":5,"sourceStartOffset":2157,"sourceEndOffset":2188},{"id":"kp-5","title":"Hook、Prompt、CLAUDE.md、CI的职责分工","knowledgeType":"step","summary":"Prompt管思考方式；CLAUDE.md管长期背景；Hook管线性的确定性动作；CI管合并前的最终裁判。","keyClaim":"这几者互补而不重叠，hook不能替代CI，CI也不能替代hook。","sourceQuote":"prompt 管的是“这次希望 AI 怎么思考”。比如你让它先读代码、再给方案、最后实施。它适合表达意图和偏好。\n\nCLAUDE.md 或项目规则文档管的是“长期背景”。比如项目架构、命名约定、不要碰的目录、常用命令、发布流程。它适合让 AI 在每次工作前理解环境。\n\nhook 管的是“事件发生时必须执行的动作”。比如改完文件就格式化，跑危险命令前先检查，session 结束前确认测试。它适合确定性、可自动化、可阻断的规则。\n\nCI 管的是“进入主干前的最终裁判”。它不关心你是人写的还是 AI 写的，只关心代码能不能通过团队统一门槛。hook 不能替代 CI，CI 也不能替代 hook。hook 是把问题尽早挡住，CI 是把漏网之鱼拦在合并前。","testabilityReason":"职责划分清晰，可设计区分题。","structureRole":"boundary","importanceScore":4,"coverageReason":"帮助理解不同机制的角色，避免混淆。","questionAngles":["Prompt和CLAUDE.md在职责上有什么不同？","Hook和CI在工程流程中各自承担什么角色？"],"testabilityScore":4,"originalSourceQuote":"prompt 管的是“这次希望 AI 怎么思考”...CLAUDE.md 或项目规则文档管的是“长期背景”...hook 管的是“事件发生时必须执行的动作”...CI 管的是“进入主干前的最终裁判”。它不关心你是人写的还是 AI 写的，只关心代码能不能通过团队统一门槛。","sourceQuoteWasRepaired":true,"sourceOrder":6,"sourceStartOffset":2853,"sourceEndOffset":3175},{"id":"kp-8","title":"产品经理需补上的工程边界问题清单","knowledgeType":"step","summary":"产品经理需要追问：AI能否删文件？改完后是否自动格式化？能否读取敏感数据？结束时如何判断真完成？哪些规则应写入项目？","keyClaim":"这些问题是AI产品经理培养工程直觉的起点。","sourceQuote":"她不需要马上写复杂脚本，但她需要知道：当一个 demo 从“我自己试试”变成“团队要复用”，就必须有人问这些问题。AI 能不能删文件？...AI 改完页面后，是否自动跑格式化...AI 能不能读取本地密钥...AI 结束时，怎样判断它是真的完成...哪些规则应该写进项目...","testabilityReason":"清单式问题，可考查工程思维。","structureRole":"method_step","importanceScore":4,"coverageReason":"提供可迁移的检查清单，实用性强。","questionAngles":["当demo需要从个人尝试转为团队复用时，产品经 const DATA=JSON.parse(document.getElementById('payload').textContent);const STORE_KEY='shibei:v26-field-review:v2:'+DATA.label;let state={index:0,showExplain:false,annotations:load()};function storage(){try{return globalThis.localStorage||null}catch{return null}}function load(){try{const store=storage();return store?JSON.parse(store.getItem(STORE_KEY))||{}:{}}catch{return {}}}function save(){try{const store=storage();if(store)store.setItem(STORE_KEY,JSON.stringify(state.annotations))}catch{}}function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function kp(q){return DATA.knowledgePoints.find(k=>k.id===q.knowledgePointId)||{}}function qid(q,i){return q.id||'q-'+(i+1)}function fieldKey(q,r){return qid(q,state.index)+':'+r.field}function userAnn(q,r){return state.annotations[fieldKey(q,r)]||{}}function renderList(){document.getElementById('list').innerHTML=DATA.questions.map((q,i)=>'<button class="qnav '+(i===state.index?'active':'')+'" data-i="'+i+'"><b>'+esc(qid(q,i))+' · '+esc(q.memoryAngle||'')+'</b><small>'+esc(kp(q).title||q.knowledgePointId)+'</small><small>'+esc(q.stem)+'</small></button>').join('');document.querySelectorAll('.qnav').forEach(b=>b.onclick=()=>{state.index=Number(b.dataset.i);render()})}function renderPhone(){const q=DATA.questions[state.index], k=kp(q);const opts=(q.options||[]).map(o=>'<div class="option '+(o.id===q.correctOptionId?'correct':'')+'"><b>'+esc(o.id)+'</b><span>'+esc(o.text)+'</span></div>').join('');document.getElementById('phone').className='phone '+(state.showExplain?'show-explain':'');document.getElementById('phone').innerHTML='<div class="phone-head"><span>×</span><b>'+(state.index+1)+' / '+DATA.questions.length+'</b><span>☆</span></div><div class="phone-content"><div class="question"><div class="kp-line"><span class="dot"></span><span>'+esc(k.title||q.knowledgePointId)+'</span></div><h2 class="stem">'+esc(q.stem)+'</h2><div class="options">'+opts+'</div></div><div class="explain"><h2>'+esc(k.title||q.knowledgePointId)+'</h2><section><h3>正确理解</h3><p>'+esc(q.correctUnderstanding)+'</p></section><section><h3>常见误区</h3><p>'+esc(q.commonMisconception)+'</p></section><section><h3>解释</h3><p>'+esc(q.explanation)+'</p></section><section><h3>来源片段</h3><p>'+esc(q.sourceSnippet)+'</p></section></div></div>'}function renderReview(){const q=DATA.questions[state.index], reviews=(DATA.reviewData.find(x=>x.questionId===qid(q,state.index))||{}).reviews||[];document.getElementById('review').innerHTML='<div class="review-title"><h2>字段预审</h2><span class="chip">'+esc(qid(q,state.index))+'</span></div>'+reviews.map(r=>{const ann=userAnn(q,r);const current=ann.status||r.status;return '<div class="field"><div class="field-head"><h3>'+esc(r.label)+'</h3><span class="chip status '+esc(current)+'">'+esc(current)+'</span></div><p class="reason">'+esc(r.reason)+'</p><p class="focus">看什么：'+esc(r.focus)+'</p><div class="label-row">'+['accept','fixable','rewrite','reject'].map(s=>'<button data-field="'+esc(r.field)+'" data-status="'+s+'" class="'+(current===s?'selected':'')+'">'+s+'</button>').join('')+'</div><textarea data-note="'+esc(r.field)+'" placeholder="写下你不同意的地方、修改意见或最终判断">'+esc(ann.note||'')+'</textarea></div>'}).join('');document.querySelectorAll('[data-status]').forEach(btn=>btn.onclick=()=>{const r=reviews.find(x=>x.field===btn.dataset.field);const key=fieldKey(q,r);state.annotations[key]={...(state.annotations[key]||{}),questionId:qid(q,state.index),field:r.field,label:r.label,aiStatus:r.status,userStatus:btn.dataset.status, status:btn.dataset.status, aiReason:r.reason, focus:r.focus, note:state.annotations[key]?.note||'',updatedAt:new Date().toISOString()};save();renderReview()});document.querySelectorAll('[data-note]').forEach(t=>{const r=reviews.find(x=>x.field===t.dataset.note);t.value=(state.annotations[fieldKey(q,r)]||{}).note||'';t.oninput=()=>{const key=fieldKey(q,r);state.annotations[key]={...(state.annotations[key]||{}),questionId:qid(q,state.index),field:r.field,label:r.label,aiStatus:r.status,userStatus:state.annotations[key]?.status||r.status,status:state.annotations[key]?.status||r.status,aiReason:r.reason,focus:r.focus,note:t.value,updatedAt:new Date().toISOString()};save()}})}function exportJson(){return {meta:{kind:'v26_field_review',label:DATA.label,sourceDataPath:DATA.jsonPath,exportedAt:new Date().toISOString(),questionCount:DATA.questions.length},annotations:Object.values(state.annotations)}}async function copyJson(){const text=JSON.stringify(exportJson(),null,2);try{await navigator.clipboard.writeText(text)}catch{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}toast('已复制标注 JSON')}function downloadJson(){const blob=new Blob([JSON.stringify(exportJson(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=DATA.label+'.field-review.json';a.click();URL.revokeObjectURL(a.href)}function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600)}function render(){renderList();renderPhone();renderReview()}document.getElementById('toggleView').onclick=()=>{state.showExplain=!state.showExplain;renderPhone()};document.getElementById('copyJson').onclick=copyJson;document.getElementById('downloadJson').onclick=downloadJson;render();
