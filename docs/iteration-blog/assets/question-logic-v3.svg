<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#fffaf4"/>
  <text x="96" y="118" fill="#1f1b12" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="48" font-weight="900">V3 题型契约</text>
  <rect x="110" y="200" width="300" height="260" rx="30" fill="#fff" stroke="#fbf3e4"/>
  <rect x="450" y="200" width="300" height="260" rx="30" fill="#fff" stroke="#fbf3e4"/>
  <rect x="790" y="200" width="300" height="260" rx="30" fill="#fff" stroke="#fbf3e4"/>
  <text x="150" y="280" fill="#1f1b12" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="28" font-weight="900">选择题</text>
  <text x="490" y="280" fill="#1f1b12" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="28" font-weight="900">判断题</text>
  <text x="830" y="280" fill="#1f1b12" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="28" font-weight="900">场景判断</text>
  <text x="150" y="340" fill="#665f50" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22">4 个选项</text>
  <text x="490" y="340" fill="#665f50" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22">成立 / 不成立</text>
  <text x="830" y="340" fill="#665f50" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22">4 个行动方案</text>
  <text x="150" y="600" fill="#665f50" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="24">场景题不再伪装成二选一，而要考边界、误区和迁移应用。</text>
</svg>
